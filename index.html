<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VOID_ARCHIVE // LAPIN</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

body {
    background:#050505;
    color:#d1d1d1;
    font-family:'JetBrains Mono', monospace;
    overflow:hidden;
    height:100vh;
    margin:0;
}

/* 👁 глаза */
.eyes {
    position:fixed;
    inset:0;
    background:url('https://i.ibb.co/0jKzZ8Y/eyes-bg.jpg') center/cover;
    opacity:0.07;
    z-index:-2;
    animation:blink 12s infinite;
}
@keyframes blink {
    0%,92%,100%{opacity:0.07}
    94%{opacity:0.01}
}

/* glitch */
.glitch{position:relative}
.glitch::after{
    content:attr(data-text);
    position:absolute;
    left:2px;
    top:0;
    text-shadow:-1px 0 red;
    clip:rect(0,900px,0,0);
    animation:noise 2s infinite alternate;
}
@keyframes noise{
    0%{clip:rect(10px,9999px,20px,0)}
    100%{clip:rect(80px,9999px,90px,0)}
}

/* scan */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(rgba(0,0,0,0)50%,rgba(0,0,0,0.25)50%);
    background-size:100% 4px;
    pointer-events:none;
}

/* whispers */
.whisper{
    position:fixed;
    opacity:0.1;
    font-size:12px;
    pointer-events:none;
    transition:10s linear;
}
</style>
</head>

<body class="p-4 md:p-8">
<div class="eyes"></div>

<!-- 🔊 звук -->
<audio id="bg-music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c0c6c7c13.mp3?filename=dark-ambient-113997.mp3">
</audio>
<button id="sound-btn" style="position:fixed;top:10px;right:10px;z-index:999">🔇</button>

<div class="max-w-7xl mx-auto h-full flex flex-col border border-white/10 bg-black/40">

<header class="p-4 flex justify-between border-b border-white/10">
<div id="status">Status: Online</div>
<div class="glitch" data-text="LAPIN">LAPIN</div>
<div id="clock"></div>
</header>

<div class="flex flex-1">
<nav class="w-60 border-r border-white/10 p-4">
<a href="#vzaidkost">vzaidkost</a><br>
<a href="#secret" id="secret-link" style="display:none">???</a>
</nav>

<main class="flex-1 p-8">
<div id="view-container"></div>
</main>
</div>
</div>

<script>
/* ================= DATA ================= */
const DATA = {
vzaidkost:{
title:"LAPIN",
content:"<p>архив неслучившегося</p>"
},
secret:{
title:"???",
content:"<p>ты нашёл это место.</p>"
}
};

/* ================= ПАМЯТЬ ================= */
let visits = localStorage.getItem('visits') || 0;
visits++;
localStorage.setItem('visits', visits);

if(visits > 1){
document.getElementById('status').innerText = "Status: I remember you";
}

/* ================= РЕНДЕР ================= */
function renderView(){
const hash = location.hash.replace('#','') || 'vzaidkost';
const data = DATA[hash] || DATA.vzaidkost;

document.body.style.filter="invert(1)";
setTimeout(()=>document.body.style.filter="none",80);

document.getElementById('view-container').innerHTML =
`<h1 class="glitch" data-text="${data.title}">${data.title}</h1>${data.content}`;
}

window.addEventListener('hashchange',renderView);

/* ================= ЗВУК ================= */
const audio=document.getElementById('bg-music');
const btn=document.getElementById('sound-btn');

document.addEventListener('click',()=>{
audio.volume=0.25;
audio.play().catch(()=>{});
},{once:true});

btn.onclick=()=>{
if(audio.paused){audio.play();btn.textContent='🔊'}
else{audio.pause();btn.textContent='🔇'}
};

/* ================= ЧАСЫ ================= */
function updateClock(){
const now=new Date();
const fake=new Date(now.getTime()+Math.sin(now.getSeconds())*2000);
document.getElementById('clock').innerText=fake.toTimeString().split(' ')[0];
}
setInterval(updateClock,1000);

/* ================= ШЁПОТ ================= */
function whisper(){
const words=["ты здесь","я вижу тебя","не выходи"];
const el=document.createElement('div');
el.className='whisper';
el.innerText=words[Math.floor(Math.random()*words.length)];
el.style.left=Math.random()*90+'vw';
el.style.bottom='0';

document.body.appendChild(el);

setTimeout(()=>{
el.style.transform='translateY(-100vh)';
el.style.opacity='0';
},100);

setTimeout(()=>el.remove(),10000);
}
setInterval(()=>{if(Math.random()>0.6)whisper()},4000);

/* ================= СЕКРЕТ ================= */
let clicks=0;
document.body.addEventListener('click',(e)=>{
if(e.target.tagName==="A") return;

clicks++;
if(clicks>=5){
document.getElementById('secret-link').style.display='block';
}
});

/* ================= ПСИХ ЭФФЕКТ ================= */
setTimeout(()=>{
alert("ты всё ещё здесь?..");
},180000);

/* ================= START ================= */
renderView();
</script>
</body>
</html>
