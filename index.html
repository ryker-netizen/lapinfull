        :root {

            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);

        }

        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff00;
            padding: 20px;
        }

        .viewport-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'), 
                        radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            opacity: 0.4;
            z-index: -1;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .glitch { position: relative; display: inline-block; }
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 2px; text-shadow: -1px 0 red; top: 0;
            background: var(--bg); overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: noise-anim 2s infinite linear alternate-reverse;
        }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            100% { clip: rect(80px, 9999px, 90px, 0); }
        }

        .scan-line {
            width: 100%; height: 100px; z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%;
            animation: scan 8s linear infinite;
        }

        @keyframes scan { 0% { bottom: 100%; } 100% { bottom: -100%; } }

        .sidebar-link {
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255,255,255,0.05);
            color: #fff;
            padding-left: 1rem;
            border-left: 2px solid #fff;
        }

        .btn-branch {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            text-align: center;
            transition: all 0.3s;
            display: block;
            text-decoration: none;
            color: inherit;
            font-size: 0.75rem;
        }
        .btn-branch:hover {
            background: #fff;
            color: #000;
        }
.whisper {
    position: fixed;
    font-size: 10px;
    opacity: 0.05;
    pointer-events: none;
    animation: fade 6s linear forwards;
}

@keyframes fade {
    0% { opacity: 0; }
    50% { opacity: 0.1; }
    100% { opacity: 0; }
}

        // ==== НЕ ЗАВИСЯЩЕЕ ОТ DOM ====

            document.querySelectorAll('.sidebar-link').forEach(l => {

            container.classList.remove('opacity-100', 'translate-y-0');
            container.classList.add('opacity-0', 'translate-y-4');

            setTimeout(() => {
                container.innerHTML = `<h2 class="text-3xl font-bold mb-12 tracking-tighter uppercase glitch" data-text="${data.title}">${data.title}</h2>${data.content}`;

                container.classList.add('opacity-100', 'translate-y-0');

                if(started) playAudioForRoot(hash);
            }, 300);
        }

            const el = document.createElement('div');

                "в архиве тишина", "эхо без голоса", "след несказанных слов"

            el.style.left = Math.random() * 100 + "%";
            el.style.top = Math.random() * 100 + "%";

            document.body.appendChild(el);

            const flickerInterval = setInterval(() => {
                el.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            }, 200);

            setTimeout(() => { clearInterval(flickerInterval); el.remove(); }, 6000);

        // ===== Часы =====

            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        }

        // ===== Обработчики =====
        document.body.addEventListener('click', (e) => {
            if (e.target === document.body) {
                hiddenClicks++;

            if (!started) {
                started = true;
                const hash = window.location.hash.replace('#', '') || 'vzaidkost';
                playAudioForRoot(hash);
            }

});

        setInterval(updateClock, 1000);
