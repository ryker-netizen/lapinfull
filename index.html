<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VOID_ARCHIVE // LAPIN</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

:root {
    --glitch-color: #ff0000;
    --primary: #d1d1d1;
    --bg: #050505;
}

body {
    background-color: var(--bg);
    color: var(--primary);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    margin: 0;
}

/* --- ТВОЙ ДИЗАЙН НЕ ТРОГАЮ --- */

#boot-screen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #00ff00;
}

.viewport-background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #1a1a1a, #050505);
    opacity: 0.4;
}

.glitch { position: relative; }
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 2px;
    text-shadow: -1px 0 red;
    animation: glitch 2s infinite;
}

@keyframes glitch {
    0% { clip: rect(0,9999px,0,0); }
    50% { clip: rect(0,9999px,50px,0); }
    100% { clip: rect(0,9999px,0,0); }
}

/* --- ДОБАВЛЕННОЕ --- */

#mute-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 999;
    font-size: 10px;
    opacity: 0.6;
    cursor: pointer;
}

.whisper {
    position: fixed;
    font-size: 10px;
    opacity: 0.05;
    pointer-events: none;
    animation: fade 6s linear forwards;
}

@keyframes fade {
    0% { opacity: 0; }
    50% { opacity: 0.1; }
    100% { opacity: 0; }
}

</style>
</head>

<body>

<div id="boot-screen">INITIALIZING...</div>

<div id="mute-btn">MUTE</div>

<audio id="bg-audio" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b4f2d6c2.mp3?filename=dark-ambient-11313.mp3">
</audio>

<div class="flex flex-1 overflow-hidden">
<nav class="w-72 border-r border-white/10 p-6 flex flex-col gap-2 bg-black/40 overflow-y-auto">
<div>Directories</div>
<a href="#vzaidkost" class="sidebar-link">/root/vzaidkost</a>
<a href="#murmure-de-vide" class="sidebar-link">/root/murmure-de-vide</a>
<a href="#ili" class="sidebar-link">/root/ili</a>
<a href="#foryouhaaa" class="sidebar-link">/root/foryouhaaa</a>
<a href="#limite" class="sidebar-link">/root/limite</a>

<div>Security</div>
<a href="#mirror" class="sidebar-link">/root/mirror_1788</a>
</nav>

<main class="flex-1 p-12">
<div id="view-container"></div>
</main>
</div>

<script>

/* --- ТВОЙ DATA НЕ ТРОГАЮ --- */

const DATA = { /* ВСТАВЬ СЮДА СВОЙ DATA БЕЗ ИЗМЕНЕНИЙ */ };

/* --- РЕНДЕР ТВОЙ ЖЕ --- */

function renderView() {
    const hash = window.location.hash.replace('#', '') || 'vzaidkost';
    const container = document.getElementById('view-container');
    const data = DATA[hash] || DATA['vzaidkost'];

    container.innerHTML = `
        <h2 class="glitch" data-text="${data.title}">${data.title}</h2>
        ${data.content}
    `;
}

/* --- МУЗЫКА --- */

const audio = document.getElementById('bg-audio');
let playing = false;

document.body.addEventListener('click', () => {
    if (!playing) {
        audio.volume = 0.3;
        audio.play();
        playing = true;
    }
});

document.getElementById('mute-btn').onclick = () => {
    audio.muted = !audio.muted;
};

/* --- LOCAL STORAGE (ПАМЯТЬ) --- */

let visits = localStorage.getItem('visits') || 0;
visits++;
localStorage.setItem('visits', visits);

if (visits > 2) {
    setTimeout(() => {
        alert("ты уже возвращался сюда");
    }, 2000);
}

/* --- СКРЫТЫЙ КЛИК ТРИГГЕР --- */

let clicks = 0;

document.body.addEventListener('click', (e) => {
    if (e.target === document.body) {
        clicks++;
        if (clicks >= 5) {
            window.location.hash = "mirror";
        }
    }
});

/* --- ВРЕМЯ (НОЧНОЙ РЕЖИМ) --- */

const hour = new Date().getHours();

if (hour >= 2 && hour <= 5) {
    setTimeout(() => {
        alert("ты не должен быть здесь ночью");
    }, 3000);
}

/* --- ШЕПОТЫ --- */

function spawnWhisper() {
    const el = document.createElement('div');
    el.className = 'whisper';
    el.innerText = ["ты здесь", "не смотри", "он рядом"][Math.floor(Math.random()*3)];

    el.style.left = Math.random()*100 + "%";
    el.style.top = Math.random()*100 + "%";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),6000);
}

setInterval(spawnWhisper, 4000);

/* --- BOOT --- */

window.onload = () => {
    setTimeout(() => {
        document.getElementById('boot-screen').remove();
        renderView();
    }, 1000);
};

window.addEventListener('hashchange', renderView);

</script>
</body>
</html>
