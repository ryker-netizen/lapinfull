<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

:root {
    --glitch-color: #ff0000;
    --primary: #d1d1d1;
    --bg: #050505;
}

body {
    background-color: var(--bg);
    color: var(--primary);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    margin: 0;
}

/* --- ТВОЙ ДИЗАЙН НЕ ТРОГАЮ --- */

#boot-screen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #00ff00;
}

.viewport-background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #1a1a1a, #050505);
    opacity: 0.4;
}

.glitch { position: relative; }
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 2px;
    text-shadow: -1px 0 red;
    animation: glitch 2s infinite;
}

@keyframes glitch {
    0% { clip: rect(0,9999px,0,0); }
    50% { clip: rect(0,9999px,50px,0); }
    100% { clip: rect(0,9999px,0,0); }
}

/* --- ДОБАВЛЕННОЕ --- */

#mute-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 999;
    font-size: 10px;
    opacity: 0.6;
    cursor: pointer;
}

.whisper {
    position: fixed;
    font-size: 10px;
    opacity: 0.05;
    pointer-events: none;
    animation: fade 6s linear forwards;
}

@keyframes fade {
    0% { opacity: 0; }
    50% { opacity: 0.1; }
    100% { opacity: 0; }
}

</style>
</head>

/* --- РЕНДЕР ТВОЙ ЖЕ --- */

function renderView() {
    const hash = window.location.hash.replace('#', '') || 'vzaidkost';
    const container = document.getElementById('view-container');
    const data = DATA[hash] || DATA['vzaidkost'];

    container.innerHTML = `
        <h2 class="glitch" data-text="${data.title}">${data.title}</h2>
        ${data.content}
    `;
}

/* --- МУЗЫКА --- */

const audio = document.getElementById('bg-audio');
let playing = false;

document.body.addEventListener('click', () => {
    if (!playing) {
        audio.volume = 0.3;
        audio.play();
        playing = true;
    }
});

document.getElementById('mute-btn').onclick = () => {
    audio.muted = !audio.muted;
};

/* --- LOCAL STORAGE (ПАМЯТЬ) --- */

let visits = localStorage.getItem('visits') || 0;
visits++;
localStorage.setItem('visits', visits);

if (visits > 2) {
    setTimeout(() => {
        alert("ты уже возвращался сюда");
    }, 2000);
}

/* --- СКРЫТЫЙ КЛИК ТРИГГЕР --- */

let clicks = 0;

document.body.addEventListener('click', (e) => {
    if (e.target === document.body) {
        clicks++;
        if (clicks >= 5) {
            window.location.hash = "mirror";
        }
    }
});

/* --- ВРЕМЯ (НОЧНОЙ РЕЖИМ) --- */

    setTimeout(() => {

/* --- ШЕПОТЫ --- */

    el.innerText = ["ты здесь", "не смотри", "он рядом"][Math.floor(Math.random()*3)];

/* --- BOOT --- */

window.onload = () => {

    }, 1000);
};

window.addEventListener('hashchange', renderView);
